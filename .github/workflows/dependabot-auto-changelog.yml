name: Dependabot Changelog Entry

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

jobs:
  update-changelog:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
    - uses: crambl/dependabot-changelog-writer@trunk
