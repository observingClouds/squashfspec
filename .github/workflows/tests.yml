name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.3
        with:
          environments: dev grib

      - name: Run tests
        run: pixi run -e dev pytest tests/ --ignore=tests/test_grib.py -v

      - name: Run GRIB tests
        run: pixi run -e grib pytest tests/test_grib.py -v
